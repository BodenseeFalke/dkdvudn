<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Das Skelett, das Vögelchen und die Nixe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div id="login-box">
            <h2>Login</h2>
            <input id="user" type="text" placeholder="Benutzername">
            <input id="pw" type="password" placeholder="Passwort">
            <button id="login-button">Einloggen</button>
            <p id="login-error" style="color:red;"></p>
        </div>
    </div>

    <!-- BUCH-INHALT (wird später per fetch geladen) -->
    <div id="content" style="visibility:hidden; opacity:0; pointer-events:none; transform:rotateY(-85deg) scale(0.85);">
        <!-- Wird dynamisch aus content.html geladen -->
    </div>

    <script>
    async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf))
            .map(b => b.toString(16).padStart(2, "0"))
            .join("");
    }

    async function checkLogin() {
        const userInput = document.getElementById("user").value.trim();
        const pwInput = document.getElementById("pw").value.trim();

        const userHash = await sha256(userInput);
        const pwHash = await sha256(pwInput);

        const validUserHash = "05d27d804fa2eab1dc6d2257b71e4d4dee299d0325794dc5f8e07eab40b672a3";
        const validPwHash = "92b9907fe97032befd467899d5d75fe14ad36a663f6a8b22679e2f096accd18a";

        if (userHash === validUserHash && pwHash === validPwHash) {

            // Overlay ausblenden
            document.getElementById("login-overlay").style.display = "none";

            // Inhalt aus externer Datei laden
            fetch("content.html")
                .then(r => r.text())
                .then(html => {
                    document.getElementById("content").innerHTML = html;

                    // Buch sichtbar machen + Animation starten
                    const content = document.getElementById("content");
                    content.classList.add("open");
                    content.style.visibility = "visible";
                    content.style.opacity = "1";
                    content.style.pointerEvents = "auto";
                    content.style.transform = "rotateY(0deg) scale(1)";
                });

        } else {
            document.getElementById("login-error").textContent =
                "Benutzername oder Passwort ist falsch.";
        }
    }

    document.getElementById("login-button").addEventListener("click", checkLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") checkLogin(); });
    </script>

</body>
</html>
