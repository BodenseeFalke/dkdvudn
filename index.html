<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Das Skelett, das Vögelchen und die Nixe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050608;
      color: #f5f0e6;
      font-family: "Georgia", "Times New Roman", serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* LOGIN PANEL */
    .login-wrapper {
      width: 90%;
      max-width: 900px;
    }

    .login-panel {
      background: radial-gradient(circle at top, #1a1c22 0%, #0a0b0d 70%);
      border: 1px solid #3b2b1a;
      padding: 50px 60px;
      border-radius: 14px;
      box-shadow: 0 0 50px rgba(0,0,0,0.7);
      position: relative;
    }

    .login-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .login-title {
      text-align: center;
      font-size: 1.9rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: #e8dfd0;
    }

    .login-subtitle {
      text-align: center;
      font-size: 1rem;
      color: #b89b6d;
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-size: 0.95rem;
      color: #d6c4a3;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #3b2b1a;
      background: #0d0e10;
      color: #f5f0e6;
      font-family: inherit;
      font-size: 0.95rem;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1.4rem;
      border-radius: 6px;
      border: 1px solid #b89b6d;
      background: linear-gradient(180deg, #3a2a18, #2a2016);
      color: #f5f0e6;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    button:hover {
      background: linear-gradient(180deg, #4a3820, #3a2a18);
    }

    .login-status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #c46b6b;
      text-align: center;
      min-height: 1.2em;
    }

    /* BOOK PANEL */
    .book-wrapper {
      width: 90%;
      max-width: 900px;
      display: none;
    }

    .panel {
      background: #111318;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      padding: 40px 50px;
      border: 1px solid #3b2b1a;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
      border-radius: 10px;
    }

    .book-title {
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .content {
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #b89b6d;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-wrapper">
    <div class="login-panel">
      <div class="login-title">Das Skelett, das Vögelchen &amp; die Nixe</div>
      <div class="login-subtitle">Verborgener Zugang</div>

      <div class="login-fields">
        <div>
          <label for="user">Benutzername</label>
          <input id="user" type="text" autocomplete="off">
        </div>
        <div>
          <label for="pass">Passwort</label>
          <input id="pass" type="password" autocomplete="off">
        </div>
        <button id="loginBtn">Öffnen</button>
        <div id="loginStatus" class="login-status"></div>
      </div>
    </div>
  </div>

  <!-- BOOK -->
  <div class="book-wrapper">
    <div class="panel">
      <div class="book-title">Das Skelett, das Vögelchen und die Nixe</div>
      <div id="content" class="content">Inhalt wird entschlüsselt …</div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    /* Zugangsdaten */
    const VALID_USER = "Johann";
    const VALID_PASS = "einfach";

    /* AES‑256‑GCM Schlüssel */
    const KEY_B64 = "3SPjvrvoZ+j44ekX8V6bn4Ko+V+BrSvC9ihv/2iY7ro=";

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function concatUint8(a, b) {
      const c = new Uint8Array(a.length + b.length);
      c.set(a, 0);
      c.set(b, a.length);
      return c;
    }

    async function decryptContent() {
      const contentEl = document.getElementById("content");
      const statusEl = document.getElementById("status");

      try {
        statusEl.textContent = "Lade verschlüsselten Inhalt …";

        const res = await fetch("content.enc", { cache: "no-store" });
        const enc = await res.json();

        const keyBytes = base64ToBytes(KEY_B64);
        const iv = base64ToBytes(enc.iv);
        const tag = base64ToBytes(enc.tag);
        const data = base64ToBytes(enc.data);

        const cipherWithTag = concatUint8(data, tag);

        const cryptoKey = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          { name: "AES-GCM" },
          false,
          ["decrypt"]
        );

        const plainBuf = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          cryptoKey,
          cipherWithTag
        );

        const html = new TextDecoder().decode(plainBuf);
        contentEl.innerHTML = html;
        statusEl.textContent = "";
      } catch (err) {
        statusEl.textContent = "Fehler beim Entschlüsseln.";
      }
    }

    /* Login */
    const loginBtn = document.getElementById("loginBtn");
    const userInput = document.getElementById("user");
    const passInput = document.getElementById("pass");
    const loginStatus = document.getElementById("loginStatus");
    const loginWrapper = document.querySelector(".login-wrapper");
    const bookWrapper = document.querySelector(".book-wrapper");

    function tryLogin() {
      if (userInput.value.trim() === VALID_USER && passInput.value === VALID_PASS) {
        loginWrapper.style.display = "none";
        bookWrapper.style.display = "block";
        decryptContent();
      } else {
        loginStatus.textContent = "Benutzername oder Passwort falsch.";
      }
    }

    loginBtn.addEventListener("click", tryLogin);
    passInput.addEventListener("keydown", e => {
      if (e.key === "Enter") tryLogin();
    });
  </script>

</body>
</html>
