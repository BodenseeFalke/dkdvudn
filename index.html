<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Das Skelett, das Vögelchen und die Nixe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050608;
      color: #f5f0e6;
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .book {
      width: 90%;
      max-width: 900px;
      background: #111318;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      padding: 40px 50px;
      border: 1px solid #3b2b1a;
      position: relative;
      overflow: hidden;
    }
    .book::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
      border-radius: 10px;
    }
    .title {
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .content {
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #b89b6d;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="book">
    <div class="title">Das Skelett, das Vögelchen und die Nixe</div>
    <div id="content" class="content">
      Inhalt wird entschlüsselt …
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    // Dein AES‑256‑GCM‑Schlüssel (Base64) aus key.txt
    const KEY_B64 = "3SPjvrvoZ+j44ekX8V6bn4Ko+V+BrSvC9ihv/2iY7ro=";

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const len = bin.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = bin.charCodeAt(i);
      }
      return bytes;
    }

    function concatUint8(a, b) {
      const c = new Uint8Array(a.length + b.length);
      c.set(a, 0);
      c.set(b, a.length);
      return c;
    }

    async function decryptContent() {
      const contentEl = document.getElementById("content");
      const statusEl = document.getElementById("status");

      try {
        statusEl.textContent = "Lade verschlüsselten Inhalt …";

        const res = await fetch("content.enc", { cache: "no-store" });
        if (!res.ok) throw new Error("content.enc konnte nicht geladen werden");
        const enc = await res.json();

        const keyBytes = base64ToBytes(KEY_B64);
        const iv = base64ToBytes(enc.iv);
        const tag = base64ToBytes(enc.tag);
        const data = base64ToBytes(enc.data);

        // WebCrypto erwartet Ciphertext + Tag am Ende
        const cipherWithTag = concatUint8(data, tag);

        const cryptoKey = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          { name: "AES-GCM" },
          false,
          ["decrypt"]
        );

        const plainBuf = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          cryptoKey,
          cipherWithTag
        );

        const decoder = new TextDecoder("utf-8");
        const html = decoder.decode(plainBuf);

        contentEl.innerHTML = html;
        statusEl.textContent = "";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Fehler beim Entschlüsseln des Inhalts.";
        contentEl.textContent = "";
      }
    }

    decryptContent();
  </script>
</body>
</html>
