<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DKDVUDN</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            animation: fadeIn 1.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-family: 'EB Garamond', serif;
            font-size: 3rem;
            margin-bottom: 0.2em;
            letter-spacing: 1px;
        }

        .subtitle {
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            margin-bottom: 2em;
            opacity: 0.7;
        }

        .coords {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            margin-top: 1em;
        }

        .symbol {
            font-size: 1.4rem;
            margin-bottom: 1.2em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="symbol">✦</div>
        <h1>DKDVUDN</h1>
        <div class="subtitle">Ein stiller Ort zwischen Koordinaten und Bedeutung</div>
        <div class="coords">N 47° XX.XXX · E 009° XX.XXX</div>
    </div>
</body>
</html>
