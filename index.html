<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Das Skelett, das Vögelchen und die Nixe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2" rel="stylesheet">

    <style>
        :root {
            --bg: #e9e4d8;
            --fg: #1f1b18;
            --accent: #5a524c;

            --paper-closed: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            --paper-open: url('https://www.transparenttextures.com/patterns/old-wall.png');
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            justify-content: center;
            text-align: center;
            perspective: 2000px;
            overflow-x: hidden;
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(0,0,0,0.65), rgba(0,0,0,0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

       .login-box {
    background: #f7f4e9;
    background-image: var(--paper-closed);
    padding: 40px 50px;
    border: 4px double rgba(240, 230, 210, 0.9);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    max-width: 420px;
    width: 90%;

    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
        .login-crest {
            font-size: 2.4rem;
            margin-bottom: 1rem;
            letter-spacing: 0.7rem;
        }

        .login-title {
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        .login-sub {
            font-size: 1.1rem;
            margin-bottom: 1.6rem;
            opacity: 0.9;
            white-space: pre-line;
        }

        .login-field { margin-bottom: 1rem; text-align: left; }
        .login-field label { display: block; margin-bottom: 0.2rem; font-size: 1.05rem; }

        .login-field input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 4px;
            border: 1px solid rgba(40, 30, 20, 0.4);
            background: #fdfaf2;
            font-size: 1.05rem;
        }

        .login-button {
            margin-top: 0.8rem;
            padding: 8px 22px;
            font-size: 1.1rem;
            border-radius: 4px;
            border: 1px solid rgba(40, 30, 20, 0.7);
            background: #e0d2b8;
            cursor: pointer;
        }

        .login-button:hover { background: #d4c4a6; }

        .login-error {
            margin-top: 0.8rem;
            color: #7b2b2b;
            font-size: 0.95rem;
            min-height: 1.2em;
        }

        /* BUCH-INHALT (wird später geladen) */
        #content {
    padding: 60px 0;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transform: rotateY(-85deg) scale(0.85);
            transform-origin: left center;
            transition: opacity 1.2s ease,
                        transform 1.6s cubic-bezier(0.23, 1, 0.32, 1),
                        filter 1.2s ease;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-crest">🦴 🐦 🧜‍♀️</div>
            <div class="login-title">Geheimer Zugang</div>
            <div class="login-sub">
                Bitte gib den Benutzernamen ein, um das Abenteuer zu beginnen.
                Das Passwort sollte einfach sein.
            </div>

            <div class="login-field">
                <label for="user">Benutzername</label>
                <input type="text" id="user" autocomplete="off">
            </div>

            <div class="login-field">
                <label for="pw">Passwort</label>
                <input type="password" id="pw">
            </div>

            <button id="login-button" class="login-button">Betreten</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <!-- BUCH-INHALT (leer, wird nachgeladen) -->
    <div id="content"></div>

    <script>
    async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf))
            .map(b => b.toString(16).padStart(2, "0"))
            .join("");
    }

    async function checkLogin() {
        const userInput = document.getElementById("user").value.trim();
        const pwInput = document.getElementById("pw").value.trim();

        const userHash = await sha256(userInput);
        const pwHash = await sha256(pwInput);

        const validUserHash = "05d27d804fa2eab1dc6d2257b71e4d4dee299d0325794dc5f8e07eab40b672a3";
        const validPwHash = "92b9907fe97032befd467899d5d75fe14ad36a663f6a8b22679e2f096accd18a";

        if (userHash === validUserHash && pwHash === validPwHash) {

            document.getElementById("login-overlay").style.display = "none";
            window.scrollTo(0, 0);

            fetch("content.html")
                .then(r => r.text())
                .then(html => {
                    const content = document.getElementById("content");
                    content.innerHTML = html;

                    content.classList.add("open");
                    content.style.visibility = "visible";
                    content.style.opacity = "1";
                    content.style.pointerEvents = "auto";
                    content.style.transform = "rotateY(0deg) scale(1)";
                });

        } else {
            document.getElementById("login-error").textContent =
                "Benutzername oder Passwort ist falsch.";
        }
    }

    document.getElementById("login-button").addEventListener("click", checkLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") checkLogin(); });
    </script>

</body>
</html>
